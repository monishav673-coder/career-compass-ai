<script>

function recommendCareer(){

let subject=document.getElementById("subject").value;

let interest=document.getElementById("interest").value;

let result="";if(subject==="computer" || interest==="programming"){

    result=
    "💻 Software Engineer<br>"+
    "🤖 AI Engineer<br>"+
    "📊 Data Scientist<br>"+
    "🔒 Cyber Security Engineer<br>"+
    "🌐 Web Developer";

}

else if(subject==="biology" || interest==="healthcare"){

    result=
    "🩺 Doctor<br>"+
    "👩‍⚕️ Nurse<br>"+
    "💊 Pharmacist<br>"+
    "🧬 Biotechnologist<br>"+
    "🏥 Physiotherapist";

}

else if(subject==="commerce" || interest==="business"){

    result=
    "💼 Accountant<br>"+
    "📈 Business Analyst<br>"+
    "💰 Financial Analyst<br>"+
    "🏢 Entrepreneur<br>"+
    "📋 Chartered Accountant (CA)";

}

else if(subject==="arts" || interest==="design"){

    result=
    "🎨 Graphic Designer<br>"+
    "🎬 Animator<br>"+
    "🖌️ UI/UX Designer<br>"+
    "📹 Content Creator<br>"+
    "👗 Fashion Designer";

}

else{

    result="Please select all options";

}

document.getElementById("result").innerHTML=result;

}

function downloadPDF(){

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF();

    let username = localStorage.getItem("user");

    let recommendation =
    document.getElementById("result").innerText;

    if(recommendation===""){

        alert("Please get a recommendation first");

        return;

    }

    recommendation =
    recommendation.replace(/[^\x00-\x7F]/g,"");

    doc.setFontSize(18);
    doc.text("Career Compass AI",20,20);

    doc.setFontSize(14);
    doc.text("Career Recommendation Report",20,35);

    doc.setFontSize(12);
    doc.text("Username: "+username,20,50);

    doc.text("Date: "+new Date().toLocaleDateString(),20,60);

    doc.text("Recommended Careers:",20,75);

    let y=90;

    let careers=recommendation.split("\n");

    for(let i=0;i<careers.length;i++){

        if(careers[i].trim()!==""){

            doc.text("- "+careers[i],25,y);

            y+=10;

        }

    }

    doc.save("Career_Report.pdf");

}function logout(){
