<!DOCTYPE html>
<html>
<head>
    <title>Career Compass AI - Login</title>

    <style>
        body{
            font-family: Arial;
            background: linear-gradient(135deg,#2b6cff,#5b8cff);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:15px;
            width:300px;
            text-align:center;
        }

        input,button{
            width:90%;
            padding:10px;
            margin:10px 0;
        }

        button{
            background:#2b6cff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        a{
            text-decoration:none;
            color:#2b6cff;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Career Compass AI</h2>

    <input type="text"
           id="loginUser"
           placeholder="Username">

    <input type="password"
           id="loginPass"
           placeholder="Password">

    <button onclick="loginUser()">
        Login
    </button>

    <p>Don't have an account?
        <a href="register.html">Register</a>
    </p>

</div>

<script>

function loginUser(){

    let username =
    document.getElementById("loginUser").value;

    let password =
    document.getElementById("loginPass").value;

    let savedUser =
    localStorage.getItem("user");

    let savedPass =
    localStorage.getItem("pass");

    // Check if user has registered
    if(savedUser === null || savedPass === null){

        alert("Please Register First");

        window.location.href = "register.html";

        return;
    }

    // Check login details
    if(username === savedUser &&
       password === savedPass){

        localStorage.setItem(
            "isLoggedIn","true");

        alert("Login Successful");

        window.location.href = "index.html";
    }

    else{
        alert("Wrong Username or Password");
    }
}

</script>

</body>
</html>
