<!DOCTYPE html>
<html>
<head>
    <title>Career Compass AI - Login</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#2b6cff,#5b8cff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box{
            background: white;
            padding: 35px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2{
            color: #2b6cff;
        }

        input,button{
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
        }

        input{
            border: 1px solid #ccc;
        }

        button{
            background: #2b6cff;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background: #1a4fd6;
        }

        a{
            text-decoration: none;
        }

        p{
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Career Compass AI 🎓</h2>

    <input type="text"
           id="loginUser"
           placeholder="Enter Username">

    <input type="password"
           id="loginPass"
           placeholder="Enter Password">

    <button onclick="loginUser()">
        Login
    </button>

    <p>Don't have an account?</p>

    <a href="register.html">
        <button>Create Account</button>
    </a>

</div>

<script>

function loginUser(){

    let username =
    document.getElementById("loginUser").value;

    let password =
    document.getElementById("loginPass").value;

    let savedUser =
    localStorage.getItem("user");

    let savedPass =
    localStorage.getItem("pass");

    if(username === savedUser &&
       password === savedPass){

        localStorage.setItem(
            "isLoggedIn","true");

        alert("Login Successful");

        window.location.href = "index.html";
    }

    else{
        alert("Wrong Username or Password");
    }
}

</script>

</body>
</html>
